# Skip module configuration for MirrorModel (Android side).
#
# Declares the extra Gradle/Maven dependencies needed by AndroidConvexBridge.kt:
#   - the native Convex Android SDK,
#   - kotlinx.serialization (JsonElement handling),
#   - kotlinx.coroutines (Flow.first).
#
# NOTE: confirm the latest Convex Android version at
#   https://docs.convex.dev/quickstart/android
# and that your Skip version reads `build.dependencies` from skip.yml. If it
# doesn't, add the same lines to the generated Android module's build.gradle.kts
# `dependencies { ... }` block instead (see MirrorApp/PLATFORMS.md).
build:
  dependencies:
    - "dev.convex:android-convexmobile:0.4.1@aar"
    - "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3"
    - "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.8.1"
