<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-labelledby="title desc">
  <title id="title">MirrorFriends logo</title>
  <desc id="desc">MirrorFriends wordmark with a futuristic mirror network mark.</desc>
  <defs>
    <linearGradient id="word" x1="0" x2="1">
      <stop offset="0%" stop-color="#eefcff"/>
      <stop offset="48%" stop-color="#8feaff"/>
      <stop offset="100%" stop-color="#b8a8ff"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8af2ff"/>
      <stop offset="55%" stop-color="#39a9ff"/>
      <stop offset="100%" stop-color="#b19cff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-40%" width="170%" height="190%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="160" rx="28" fill="#071424"/>
  <g transform="translate(34 24)" filter="url(#glow)">
    <path d="M56 0 104 28v56l-48 28L8 84V28Z" fill="#0b213c" stroke="url(#edge)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M40 38h32l16 28-16 28H40L24 66Z" fill="#08192f" stroke="#e7fbff" stroke-width="4" stroke-linejoin="round"/>
    <path d="M56 0v38M56 94v18M8 28l32 10M104 28 72 38M24 66H8M88 66h16" stroke="#73eaff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="56" cy="66" r="10" fill="#dbfbff"/>
  </g>
  <text x="164" y="82" fill="url(#word)" font-family="Avenir Next, Segoe UI, system-ui, sans-serif" font-size="54" font-weight="800" letter-spacing="0">MirrorFriends</text>
  <text x="168" y="115" fill="#89dff7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="600" letter-spacing="3">PRIVATE AI MIRROR NETWORK</text>
  <path d="M168 130h270l26-18h120" fill="none" stroke="url(#edge)" stroke-width="3" stroke-linecap="round"/>
</svg>
